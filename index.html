<!doctype html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Persona Nexus Character</title>
  <link rel="stylesheet" href="/src/style.css">
</head>

<body>
  <div class="home-container">
    <h2>PERSONA NEXUS CHARACTER</h2>
    <p class="subtitle">AI 角色管理系統</p>
    <a href="creator-create.html">
      <button type="button">創建角色</button>
    </a>
  </div>

  <script type="module">
    import { getCurrentUserId, getConfig } from './src/api.js';
    import { loadConfig } from './src/config-loader.js';

    try {
      // 嘗試從 gateway 加載配置
      await loadConfig();
      const config = getConfig();
      const LOGIN_APP_URL = config.frontends.web;

      if (!getCurrentUserId()) {
        window.location.href = `${LOGIN_APP_URL}/`;
      }
    } catch (error) {
      // 如果配置加載失敗（例如 gateway 沒開），使用備用登入頁面
      console.error('Failed to load config:', error);

      if (!getCurrentUserId()) {
        // 使用預設的登入頁面位置
        window.location.href = 'http://localhost:5173/';
      }
    }
  </script>
</body>

</html>
